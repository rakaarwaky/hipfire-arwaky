[package]
name = "hipfire-arwaky-bin"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[[bin]]
name = "hipfire-arwaky"
path = "src/hipfire-arwaky.rs"

[[bin]]
name = "hipfire-arwaky-run"
path = "src/run.rs"

[dependencies]
hipfire-runtime = { path = "../local-patched/hipfire-runtime", features = ["deltanet", "arch-qwen35"] }
hipfire-arch-qwen35 = { path = "../local-patched/hipfire-arch-qwen35", features = ["deltanet"] }
rdna-compute = { path = "../local-patched/rdna-compute", features = ["deltanet"] }
libc = { workspace = true }
