# build_kld_ref needs no GPU / arch features — it just orchestrates
# llama-perplexity and reduces uint16 logits to top-K. Stdlib-only.
[[example]]
name = "build_kld_ref"
required-features = []

# build_kld_ref_native (F2) — llama-FREE KLD ref producer; runs the hipfire
# F32 oracle forward and writes the SAME HFKLDR format eval_hipfire consumes.
[[example]]
name = "build_kld_ref_native"
required-features = ["arch-qwen35", "deltanet"]

# eval_hipfire_fullvocab (F3) — FULL-VOCAB KLD of a hipfire quant vs the hipfire
# F32 oracle (dual forward, no ref top-K approx) for parity with
# llama-perplexity --kl-divergence full-vocab KLD.
[[example]]
name = "eval_hipfire_fullvocab"
required-features = ["arch-qwen35", "deltanet"]

# oracle_xcheck (F1) — dumps per-token F32-oracle logits over real tokens (true
# fp32 KV) for cross-checking the native bf16/F32 forward against a reference.
[[example]]
name = "oracle_xcheck"
required-features = ["arch-qwen35", "deltanet"]

[[example]]
name = "eval_hipfire"
required-features = ["arch-qwen35", "deltanet"]

# eval_hipfire_llama — KLD eval for llama-arch hipfire models (Qwen3 /
# Qwen2 / Llama / Mistral / TinyLlama). Same HFKSEQ output as
# eval_hipfire, but the forward path goes through
# `<Llama as Architecture>` + `hipfire_runtime::llama::*` instead of
# the qwen35 arch. Per-token scoring only — llama-arch
# `forward_prefill_batch` doesn't expose the hidden-state capture hook
# that eval_hipfire's prefill mode relies on.
[[example]]
name = "eval_hipfire_llama"
required-features = ["arch-llama"]

# Tokenizer-parity helper: reads a .hfq's tokenizer + tokenizes a text slice.
# No GPU / arch features needed (tokenizer is pure CPU).
[[example]]
name = "tokenize_slice"
required-features = []

# eval_gguf — KLD eval for GGUF candidates (FIFO + llama-perplexity).
# Stdlib only; no GPU / arch features.
[[example]]
name = "eval_gguf"
required-features = []

# imatrix_collect — Phase A Step 4 (Tier 2): subprocess wrapper around
# llama-imatrix for the activation-weighted-LS calibration pipeline.
# Stdlib only; no GPU / arch features.
[[example]]
name = "imatrix_collect"
required-features = []

# ─── Tier 1 calibration binaries (foundation scaffolds, 2026-05-19) ────
#
# `collect_imatrix` and `collect_hessian` are the hipfire-native
# replacements for the Tier 2 wrappers above. Both currently ship as
# `unimplemented!()` scaffolds — argument parsing + module docs only —
# so that the workspace compiles cleanly while follow-on subagent
# tasks build the forward pass, on-GPU activation/Hessian reductions,
# and the GGUF/HFHS-v1 writers on top.
#
# Stdlib only at this stage; no GPU / arch features required for the
# scaffold itself. When the forward pass lands these bins will pick up
# `required-features = ["arch-qwen35", "arch-llama"]` (or whichever
# arches the Tier 1 path supports).
[[bin]]
name = "collect_imatrix"
path = "src/bin/collect_imatrix.rs"
required-features = []

[[bin]]
name = "collect_hessian"
path = "src/bin/collect_hessian.rs"
required-features = []
