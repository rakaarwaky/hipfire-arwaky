[package]
name = "hipfire-runtime"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Inference orchestrator for RDNA GPUs"

[features]
# Cargo features for selective architecture inclusion (Phase 2 PR 12).
#
# Default keeps today's full-featured behavior: `cargo build --release`
# produces the same daemon + example surface as before this PR.
# Downstream library consumers may opt out of any subset of arches, e.g.
#
#   [dependencies]
#   hipfire-runtime = { version = "...", default-features = false,
#                       features = ["deltanet", "arch-qwen35"] }
#
# This trims the resolved dep graph to just the qwen35 arch crate plus
# the deltanet runtime feature, with all other arch crates absent.
#
# Internal example builds:
# Each arch crate already lists `hipfire-runtime` in its
# `[dependencies]`; promoting these to `[dependencies]` here would form
# a package-level cycle, which cargo rejects. To keep the cycle
# avoidance, the arch crates are listed as plain (non-optional)
# `[dev-dependencies]` of this crate. cargo's resolver excludes the
# dev-dep edge from the cycle check.
#
# Side-effect: when a workspace example is built (via
# `cargo build --example daemon` etc.), cargo's resolver follows the
# dev-dep edge in both directions, which activates the `default`
# feature on `hipfire-runtime` from the dev-dep activation path. That
# in turn re-activates all `arch-*` features, undoing any
# `--no-default-features` the user passed for an example build. This
# is a workspace-internal limitation only; it does NOT affect
# downstream library consumers, who never enter the dev-dep cycle.
#
# Example-target gating uses `required-features` (per `[[example]]`
# block below) which serves both as documentation of which features
# each example needs and as the gate for downstream library consumers
# who attempt to build examples through their own build script.
default = ["arch-qwen35", "arch-qwen35-vl", "arch-llama", "arch-qwen2", "arch-deepseek4", "arch-dots-ocr", "deltanet"]
deltanet = ["rdna-compute/deltanet", "hipfire-dispatch/deltanet"]
arch-qwen35 = []
arch-qwen35-vl = []
arch-llama = []
arch-qwen2 = []
arch-deepseek4 = []
arch-dots-ocr = []
[dependencies]
hip-bridge = { path = "../hip-bridge" }
rdna-compute = { path = "../rdna-compute" }
hipfire-dispatch = { path = "../hipfire-dispatch" }
memmap2 = "0.9"
byteorder = "1"
serde = { version = "1", features = ["derive"] }
# preserve_order: keep JSON object key insertion-order (IndexMap) instead of the
# default BTreeMap alphabetic sort. Required so request tool-definition key order
# survives parse → render → `| tojson`, byte-matching the model's trained
# chat_template (HF apply_chat_template preserves insertion order). Feature-
# unifies across the workspace build.
serde_json = { version = "1", features = ["preserve_order"] }
base64 = "0.22"
libc = "0.2"
rayon = "1"
# GPT-2 / cl100k pre-tokenization for encode_gpt2_bpe. Reference encoders
# (HF tokenizers, tiktoken) chunk input via regex into ≤10-byte words/runs,
# then BPE each chunk independently; without that step the merge PQ runs
# on the whole prompt as one problem and goes O(N log N) with a huge
# constant from cross-word merges + stale-entry churn. PR #230 fixed
# per-iteration costs but not the algorithmic shape — this regex restores
# the canonical chunking.
regex = "1"
# Renders the upstream HF chat_template (Jinja) when present in
# .hfq metadata, so prompt framing matches what the model was
# trained on. Falls back to the hand-rolled `prompt_frame::ChatFrame`
# scaffolding when the template is absent or fails to render.
# `json` enables the `tojson` filter — Qwen3.5/3.6 + Gemma 4 tool-rendering
# branches use `{{ tool | tojson }}` to emit OpenAI-shape function specs
# inside the system block; without it, tool-using turns die at render time
# (caught by jinja_smoke scenario C, 2026-05-09).
minijinja = { version = "2", features = ["loop_controls", "json", "preserve_order"] }
# `pycompat` ships an unknown-method callback that makes Python
# str/list/dict methods (e.g. `.startswith`, `.split`, `.rstrip`)
# work on plain Jinja values — required by the Qwen3 family
# template which uses these throughout.
minijinja-contrib = { version = "2", features = ["pycompat"] }

# Examples in this crate (daemon, infer_qwen35, infer_qwen3, infer_vl, etc.)
# consume the arch crates. These are dev-dependencies — cargo refuses
# optional dev-dependencies AND its cycle checker excludes the dev-dep
# edge, which is what allows hipfire-runtime to list arch crates here
# despite each arch crate already depending on hipfire-runtime.
# Per-arch granularity for downstream consumers comes from the cargo
# features above and `required-features` on each `[[example]]` block
# below.
[dev-dependencies]
hipfire-arch-qwen35 = { path = "../hipfire-arch-qwen35" }
hipfire-arch-qwen35-vl = { path = "../hipfire-arch-qwen35-vl" }
hipfire-arch-llama = { path = "../hipfire-arch-llama" }
hipfire-arch-qwen2 = { path = "../hipfire-arch-qwen2" }
hipfire-arch-lfm2moe = { path = "../hipfire-arch-lfm2moe" }
hipfire-arch-minimax = { path = "../hipfire-arch-minimax" }
hipfire-arch-deepseek4 = { path = "../hipfire-arch-deepseek4" }
hipfire-arch-dots-ocr = { path = "../hipfire-arch-dots-ocr" }
hipfire-detect = { path = "../hipfire-detect" }
hipfire-atlas = { path = "../hipfire-atlas" }

# Each example below carries `required-features` listing the cargo
# features its `use hipfire_arch_*` imports depend on. This documents
# the per-example arch dependency and gates the example for downstream
# library consumers (who do not enter the dev-dep cycle and so respect
# the `--no-default-features` flag faithfully).
#
# Examples NOT listed here (bench_q8, probe_wmma, dump_meta, …) do not
# touch arch crates and build under any feature combination.

